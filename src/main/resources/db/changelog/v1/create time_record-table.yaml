databaseChangeLog:
  - changeSet:
      id: create-time_record-table
      author: Veteroch4k
      changes:
        - createTable:
            columns:
              - column:
                  autoIncrement: true
                  constraints:
                    nullable: false
                    primaryKey: true
                  name: id
                  type: BIGINT
              - column:
                  constraints:
                    nullable: false
                  name: employee_id
                  type: BIGINT
              - column:
                  constraints:
                    nullable: false
                  name: task_id
                  type: BIGINT
              - column:
                  constraints:
                    nullable: false
                  name: start_time
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  constraints:
                    nullable: true
                  name: end_time
                  type: TIMESTAMP WITH TIME ZONE
              - column:
                  constraints:
                    nullable: false
                  name: description
                  type: TEXT
            tableName: time_records

        - addForeignKeyConstraint:
            baseTableName: time_records
            baseColumnNames: task_id
            referencedTableName: tasks
            referencedColumnNames: id
            constraintName: fk-task_id-tasks
            deleteCascade: true

